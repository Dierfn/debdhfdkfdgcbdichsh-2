name: Build Dyrz Client
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        shell: powershell
        run: Expand-Archive -Path "dyrz-src-v2.zip" -DestinationPath "dyrz-extracted" -Force

      - name: Download missing submodules manually
        shell: powershell
        run: |
          $dest = "dyrz-extracted/dyrz-src/libraries/libnbtplusplus"
          if (!(Test-Path "$dest/CMakeLists.txt")) {
            Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
            git clone https://github.com/PrismLauncher/libnbtplusplus.git $dest
          }

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            qt6-base:p
            qt6-networkauth:p
            qt6-imageformats:p
            qt6-svg:p
            qt6-tools:p
            extra-cmake-modules:p
            zlib:p
            libarchive:p
            quazip-qt6:p
            cmark:p
            tomlplusplus:p
            qrencode:p
            vulkan-headers:p
            clang:p
            ntldd:p

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          SRC=$(find dyrz-extracted -name "CMakeLists.txt" | xargs grep -l "^project" | head -1 | xargs dirname)
          echo "Source found at: $SRC"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLauncher_Name=DyrzClient \
            -DLauncher_DisplayName="Dyrz Client" \
            -DLauncher_APP_BINARY_NAME=dyrzclient \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_OBJDUMP=/ucrt64/bin/objdump.exe \
            -DENABLE_LTO=OFF \
            -DCLANG_FORMAT_PROG=false \
            -DCMAKE_POLICY_DEFAULT_CMP0177=NEW \
            -DCMAKE_CXX_FLAGS="-Wno-error -Wno-implicit-fallthrough -Wno-deprecated-declarations -Wno-unused-variable -Wno-unused-parameter -Wno-sign-compare -Wno-reorder" \
            -DCMAKE_C_FLAGS="-Wno-error -Wno-implicit-fallthrough -Wno-deprecated-declarations" \
            -S "$SRC"

      - name: Strip problematic flags from build files
        shell: msys2 {0}
        run: |
          find build -name "*.ninja" | xargs sed -i 's/-mguard=cf//g; s/-Werror[^ ]*//g' 2>/dev/null || true
          echo "Flags stripped"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Install
        shell: msys2 {0}
        run: cmake --install build

      - name: Bundle all DLLs
        shell: msys2 {0}
        run: |
          set +e
          EXEDIR="install"
          echo "Bundling DLLs into $EXEDIR"

          # Run windeployqt to get Qt DLLs and plugins
          windeployqt-qt6 "$EXEDIR/dyrzclient.exe" --no-translations --no-system-d3d-compiler --no-opengl-sw || true

          # Copy every single DLL from ucrt64/bin that the exe or any copied DLL might need
          # Use ntldd to get the list, convert Windows paths to MSYS2 paths
          ntldd -R "$EXEDIR/dyrzclient.exe" 2>/dev/null | grep -i "ucrt64" | while read line; do
            # Extract the Windows path after =>
            winpath=$(echo "$line" | grep -oP '(?<=> ).*?(?= \()')
            if [ -n "$winpath" ]; then
              # Convert Windows path to MSYS2 path
              msyspath=$(cygpath "$winpath" 2>/dev/null)
              if [ -f "$msyspath" ]; then
                cp "$msyspath" "$EXEDIR/" 2>/dev/null && echo "Copied: $(basename $msyspath)"
              fi
            fi
          done

          # Always manually copy these critical ones
          for dll in \
            libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll \
            libzstd.dll zlib1.dll libarchive-13.dll \
            libcrypto-3-x64.dll libssl-3-x64.dll \
            libquazip1-qt6.dll libcmark.dll libqrencode.dll \
            libbz2-1.dll liblzma-5.dll liblz4.dll \
            libpcre2-16-0.dll libdouble-conversion.dll \
            libicudt74.dll libicuin74.dll libicuuc74.dll \
            libharfbuzz-0.dll libpng16-16.dll libfreetype-6.dll \
            libglib-2.0-0.dll libgraphite2.dll libbrotlidec.dll \
            libbrotlicommon.dll libintl-8.dll libiconv-2.dll \
            libmd4c.dll libjpeg-8.dll; do
            [ -f "/ucrt64/bin/$dll" ] && cp "/ucrt64/bin/$dll" "$EXEDIR/" 2>/dev/null || true
          done

          echo "=== Final DLL count ==="
          ls "$EXEDIR"/*.dll 2>/dev/null | wc -l
          echo "=== All files ==="
          ls "$EXEDIR"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DyrzClient-Windows
          path: install/
          retention-days: 30
