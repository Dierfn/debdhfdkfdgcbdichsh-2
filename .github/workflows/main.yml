name: Build Dyrz Client
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        shell: powershell
        run: Expand-Archive -Path "dyrz-src-v2.zip" -DestinationPath "dyrz-extracted" -Force

      - name: Download missing submodules manually
        shell: powershell
        run: |
          $dest = "dyrz-extracted/dyrz-src/libraries/libnbtplusplus"
          if (!(Test-Path "$dest/CMakeLists.txt")) {
            Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
            git clone https://github.com/PrismLauncher/libnbtplusplus.git $dest
          }

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            qt6-base:p
            qt6-networkauth:p
            qt6-imageformats:p
            qt6-svg:p
            qt6-tools:p
            extra-cmake-modules:p
            zlib:p
            libarchive:p
            quazip-qt6:p
            cmark:p
            tomlplusplus:p
            qrencode:p
            vulkan-headers:p
            clang:p

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          SRC=$(find dyrz-extracted -name "CMakeLists.txt" | xargs grep -l "^project" | head -1 | xargs dirname)
          echo "Source found at: $SRC"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLauncher_Name=DyrzClient \
            -DLauncher_DisplayName="Dyrz Client" \
            -DLauncher_APP_BINARY_NAME=dyrzclient \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_OBJDUMP=/ucrt64/bin/objdump.exe \
            -DENABLE_LTO=OFF \
            -DCLANG_FORMAT_PROG=false \
            -DCMAKE_POLICY_DEFAULT_CMP0177=NEW \
            -DCMAKE_CXX_FLAGS="-Wno-error -Wno-implicit-fallthrough -Wno-deprecated-declarations -Wno-unused-variable -Wno-unused-parameter -Wno-sign-compare -Wno-reorder" \
            -DCMAKE_C_FLAGS="-Wno-error -Wno-implicit-fallthrough -Wno-deprecated-declarations" \
            -S "$SRC"

      - name: Strip problematic flags from build files
        shell: msys2 {0}
        run: |
          find build -name "*.ninja" | xargs sed -i 's/-mguard=cf//g; s/-Werror[^ ]*//g' 2>/dev/null || true
          echo "Flags stripped"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Install
        shell: msys2 {0}
        run: cmake --install build

      - name: Copy Qt DLLs and runtime files
        shell: msys2 {0}
        run: |
          cp /ucrt64/bin/Qt6Core.dll install/
          cp /ucrt64/bin/Qt6Gui.dll install/
          cp /ucrt64/bin/Qt6Widgets.dll install/
          cp /ucrt64/bin/Qt6Network.dll install/
          cp /ucrt64/bin/Qt6NetworkAuth.dll install/
          cp /ucrt64/bin/Qt6Svg.dll install/
          cp /ucrt64/bin/Qt6Xml.dll install/
          cp /ucrt64/bin/Qt6Concurrent.dll install/
          cp /ucrt64/bin/libgcc_s_seh-1.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libstdc++-6.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libwinpthread-1.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libzstd.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/zlib1.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libarchive-13.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libcrypto-3-x64.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libssl-3-x64.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libquazip1-qt6.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libcmark.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libqrencode.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libbz2-1.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/liblzma-5.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/liblz4.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libpcre2-16-0.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libdouble-conversion.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libicudt74.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libicuin74.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libicuuc74.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libharfbuzz-0.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libmd4c.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libpng16-16.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libjpeg-8.dll install/ 2>/dev/null || true
          cp /ucrt64/bin/libfreetype-6.dll install/ 2>/dev/null || true
          mkdir -p install/platforms install/styles install/imageformats install/tls
          cp /ucrt64/share/qt6/plugins/platforms/qwindows.dll install/platforms/
          cp /ucrt64/share/qt6/plugins/styles/qwindowsvistastyle.dll install/styles/ 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/imageformats/*.dll install/imageformats/ 2>/dev/null || true
          cp /ucrt64/share/qt6/plugins/tls/*.dll install/tls/ 2>/dev/null || true
          echo "DLLs copied!"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DyrzClient-Windows
          path: install/
          retention-days: 30
